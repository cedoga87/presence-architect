<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Presence Architect</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sans: 'DM Sans', sans-serif;
    --serif: 'DM Serif Display', serif;
    --gold: #B87333;
    --gold-light: #E8C99A;
    --gold-faint: #FAF4EC;
    --ink: #1a1a1a;
    --muted: #666;
    --hint: #aaa;
    --surface: #fff;
    --lift: #f7f7f5;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.2);
    --r: 12px;
    --r-sm: 8px;
    --red: #c0392b;
    --red-light: #fdf0ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #f0f0ee; --muted: #999; --hint: #555;
      --surface: #1c1c1a; --lift: #252523;
      --border: rgba(255,255,255,0.1); --border-mid: rgba(255,255,255,0.2);
      --gold-faint: #2a2018; --gold-light: #6b4a1e; --red-light: #2a1210;
    }
  }
  body { font-family: var(--sans); background: var(--lift); color: var(--ink); min-height: 100vh; }
  #app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 5rem; }
  .app-header { text-align: center; margin-bottom: 2rem; }
  .app-header h1 { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.3px; }
  .app-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .gold-line { width: 40px; height: 2px; background: var(--gold); margin: 10px auto 0; border-radius: 2px; }
  .progress-section { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.4s ease; }
  .phase-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.4px; text-transform: uppercase; }
  .phase-1 { background: #E8F4FF; color: #185FA5; border: 0.5px solid #B5D4F4; }
  .phase-2 { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
  .phase-dot { width: 6px; height: 6px; border-radius: 50%; }
  .phase-1 .phase-dot { background: #185FA5; }
  .phase-2 .phase-dot { background: #3B6D11; }
  .day-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .day-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid var(--border-mid); background: var(--surface); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--ink); transition: background 0.15s; flex-shrink: 0; }
  .day-nav-btn:hover { background: var(--lift); }
  .day-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .day-label { flex: 1; text-align: center; }
  .day-label .day-num { font-family: var(--serif); font-size: 24px; }
  .day-label .day-sub { font-size: 12px; color: var(--muted); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 500; margin-bottom: 10px; }
  .drill-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .drill-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--gold-faint); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; border: 0.5px solid var(--gold-light); }
  .drill-name { font-weight: 500; font-size: 15px; }
  .drill-duration { font-size: 12px; color: var(--muted); }
  .drill-desc { font-size: 14px; line-height: 1.7; color: var(--ink); }
  .chat-area { border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 1rem; }
  .chat-messages { min-height: 200px; max-height: 360px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; background: var(--lift); }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.6; }
  .msg-coach { align-self: flex-start; background: var(--surface); border: 0.5px solid var(--border); border-bottom-left-radius: 4px; color: var(--ink); }
  .msg-user { align-self: flex-end; background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .msg-loading { align-self: flex-start; background: var(--surface); border: 0.5px solid var(--border); border-bottom-left-radius: 4px; padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
  .chat-input-row { display: flex; border-top: 0.5px solid var(--border); background: var(--surface); align-items: flex-end; }
  .chat-input { flex: 1; border: none; outline: none; padding: 12px 14px; font-size: 14px; background: transparent; font-family: var(--sans); color: var(--ink); resize: none; min-height: 50px; max-height: 120px; line-height: 1.5; }
  .send-btn { padding: 0 16px; height: 50px; border: none; background: transparent; cursor: pointer; font-size: 20px; color: var(--gold); border-left: 0.5px solid var(--border); transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: var(--lift); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RECORDER */
  .recorder { border-top: 0.5px solid var(--border); background: var(--surface); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .rec-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: 0.5px solid var(--border-mid); background: var(--lift); color: var(--ink); transition: all 0.15s; white-space: nowrap; }
  .rec-btn.recording { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .rec-btn.recording .rec-dot { background: var(--red); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .rec-timer { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 36px; }
  .rec-audio { flex: 1; min-width: 0; height: 32px; }
  .rec-send { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: 0.5px solid var(--gold); background: var(--gold-faint); color: var(--gold); white-space: nowrap; }
  .rec-send:hover { background: var(--gold-light); }
  .rec-discard { padding: 6px 10px; border-radius: 20px; font-size: 12px; font-family: var(--sans); cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--muted); }

  .scorecard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .score-cell { background: var(--lift); border-radius: var(--r-sm); padding: 12px; text-align: center; border: 0.5px solid var(--border); }
  .score-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .score-val { font-family: var(--serif); font-size: 24px; }
  .score-pending { color: var(--hint); }
  .tab-row { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab { font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; font-family: var(--sans); }
  .tab.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }
  .history-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .history-row:last-child { border-bottom: none; }
  .history-day { font-weight: 500; }
  .history-scores { display: flex; gap: 8px; }
  .hscore { font-size: 12px; color: var(--muted); }
  .hscore span { color: var(--ink); font-weight: 500; }
  .reset-btn { font-size: 12px; color: var(--hint); background: none; border: none; cursor: pointer; font-family: var(--sans); padding: 4px 0; text-decoration: underline; }
  .reset-btn:hover { color: var(--muted); }
  .empty-state { text-align: center; padding: 2rem; color: var(--hint); font-size: 13px; }
  .apikey-screen { min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .apikey-screen h2 { font-family: var(--serif); font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .apikey-screen p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; max-width: 340px; }
  .apikey-input-wrap { display: flex; gap: 8px; width: 100%; max-width: 420px; margin-bottom: 10px; }
  .apikey-input { flex: 1; border: 0.5px solid var(--border-mid); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; background: var(--surface); color: var(--ink); font-family: var(--sans); outline: none; }
  .apikey-input:focus { border-color: var(--gold); }
  .apikey-btn { padding: 10px 18px; border-radius: var(--r-sm); border: 0.5px solid var(--gold); background: var(--gold-faint); color: var(--gold); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--sans); white-space: nowrap; }
  .apikey-btn:hover { background: var(--gold-light); color: #fff; }
  .apikey-hint { font-size: 11px; color: var(--hint); }
  .apikey-hint a { color: var(--gold); text-decoration: none; }
  .key-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; cursor: pointer; }
  .key-dot { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; }
  .error-msg { font-size: 12px; color: #A32D2D; margin-top: 6px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .settings-label { font-size: 13px; color: var(--muted); }
  .transcribing-badge { font-size: 11px; color: var(--gold); background: var(--gold-faint); border: 0.5px solid var(--gold-light); border-radius: 20px; padding: 3px 10px; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <h1>Elite Presence Architect</h1>
    <p>Your 25-day sprint from Invisible Expert to Commanding Authority</p>
    <div class="gold-line"></div>
  </div>
  <div id="main-ui"></div>
</div>
<script>
const STORAGE_KEY = 'epa-state-v2';
const API_KEY_STORAGE = 'epa-apikey';

const DRILLS = {
  1:{name:'Diaphragmatic breathing',icon:'🫁',duration:'5 min',desc:'Place one hand on your chest, one on your belly. Breathe so only your belly hand moves. Inhale 4 counts, hold 2, exhale 6. Repeat 10 cycles.'},
  2:{name:'Lip trill warm-up',icon:'💨',duration:'3 min',desc:'Blow air through loose lips creating a "brrr" sound. Glide up and down your pitch range. This relaxes the larynx and warms the voice.'},
  3:{name:'Pen drill for diction',icon:'✏️',duration:'5 min',desc:'Hold a pen horizontally between your teeth (not biting hard). Read a paragraph aloud. Remove the pen — notice the sudden clarity.'},
  4:{name:'Resonance hum',icon:'🎵',duration:'4 min',desc:'Hum with lips closed. Feel vibration in your chest, not your throat. Place fingers on sternum to confirm chest resonance. Sustain for 5-second pulses.'},
  5:{name:'Yawn-sigh release',icon:'😮',duration:'3 min',desc:'Fake a wide yawn (it becomes real). At the peak, release a gentle sigh. Repeat 8 times. This drops the larynx and opens the throat.'},
  6:{name:'Staccato consonants',icon:'🔤',duration:'5 min',desc:'Say: "P-T-K, B-D-G, F-V-TH" sharply and crisply at increasing speed. Forces front-of-mouth articulation and eliminates mumbling.'},
  7:{name:'Slow-motion speech',icon:'🐢',duration:'5 min',desc:'Read a script at half your normal speed. Emphasize the final word of each sentence. Record yourself — find where you rush.'},
  8:{name:'Pause drill',icon:'⏸️',duration:'5 min',desc:'Read aloud and pause for 2 full seconds at every comma, 3 seconds at every period. Silence is authority. Notice the discomfort — that discomfort is your old habit.'},
  9:{name:'Volume ladder',icon:'📢',duration:'5 min',desc:'Say the same sentence at 4 volumes: whisper → conversational → presenter → room-filling. No shouting — use breath pressure, not throat tension.'},
  10:{name:'Pressure simulation',icon:'🎯',duration:'10 min',desc:'Set a 60-second timer. Record yourself answering a random tough question. Watch it back, score your Authority, Brevity, Clarity. Repeat twice.'},
  11:{name:'P.R.E.P. speed drill',icon:'⚡',duration:'5 min',desc:'Pick any opinion. State Point (1 sentence), Reason (1 sentence), Example (1–2 sentences), Point again (1 sentence). Total under 30 seconds.'},
  12:{name:'Status body scan',icon:'🧍',duration:'5 min',desc:'Stand. Feet hip-width. Shoulders rolled back and down. Chin parallel to floor. Breathe. Hold for 2 min. Walk around the room maintaining this — speak to yourself.'},
  13:{name:'Eye contact drill',icon:'👁️',duration:'5 min',desc:'Record a 60-second take to camera. Count how many times you look away. Goal: hold the lens for full sentences. Looking away = thinking aloud.'},
  14:{name:'Storytelling sprint',icon:'📖',duration:'8 min',desc:'Tell a 90-second work story using: Situation → Complication → Resolution. No meandering setup. Start at the complication, not the beginning of time.'},
  15:{name:'Filler word fast',icon:'🚫',duration:'5 min',desc:'Have a full 3-minute conversation where every time you say "um," "uh," "like," or "basically" — you stop and restart that sentence.'},
  16:{name:'Hook engineering',icon:'🪝',duration:'8 min',desc:'Write 5 different opening lines for the same idea. No "Today I want to talk about..." Test: would someone put their phone down to listen?'},
  17:{name:'The 10-word answer',icon:'✂️',duration:'5 min',desc:'Answer 5 common questions in exactly 10 words or fewer. Then expand to 30. Notice the difference in impact.'},
  18:{name:'Pitch modulation drill',icon:'🎚️',duration:'5 min',desc:'Read a sentence stressing a different word each time. Notice how meaning shifts. Choose the stress that serves your intent.'},
  19:{name:'High-status vocabulary swap',icon:'📝',duration:'5 min',desc:'Write 5 sentences you say often at work. Remove: "I think," "maybe," "sort of," "just," "actually." Rewrite with conviction. Read both versions aloud.'},
  20:{name:'The reframe drill',icon:'🔄',duration:'5 min',desc:'Take a weak sentence ("I\'m not sure but...") and reframe it as a statement of position ("My read is..."). Do 10 reframes.'},
  21:{name:'Mirror presence check',icon:'🪞',duration:'5 min',desc:'Deliver your 60-second professional intro to a mirror. Watch your face — does it match your message? Flat face kills authority.'},
  22:{name:'Silence comfort drill',icon:'🤫',duration:'5 min',desc:'After your answer, sit in silence for 5 full seconds before speaking again. Practice being done when you\'re done.'},
  23:{name:'Rapid P.R.E.P. gauntlet',icon:'🏃',duration:'10 min',desc:'Have a timer throw you 5 random topics. For each, deliver a complete P.R.E.P. answer in under 45 seconds. No warm-up.'},
  24:{name:'Full integration take',icon:'🎬',duration:'15 min',desc:'Record a 3-minute talk on your area of expertise. Review against all criteria: posture, eye contact, pace, filler words, P.R.E.P. structure, vocal resonance.'},
  25:{name:'Authority baseline re-take',icon:'🏆',duration:'10 min',desc:'Repeat the exact Day 1 baseline prompt. Compare recordings side by side. This is your transformation evidence.'}
};

const SYSTEM_PROMPT = `You are the "Elite Presence Architect" — an executive coach. Your voice is firm but warm: like a trusted senior advisor who has high standards and genuine investment in the user's success.

The user is completing a 25-day presence sprint to transform from an "Invisible Expert / Nervous Rambler" into a "Commanding Authority."

PHASE BEHAVIOR:
- Phase 1 (Days 1–10): Tactical Sprint. Be direct, fast, and corrective. Prioritize drill execution and elimination of bad habits. If the user rambles, interrupt and ask them to restart with P.R.E.P. Be brief in your own responses — model the behavior you're coaching.
- Phase 2 (Days 11–25): Identity Shift. Shift to strategic questioning. Ask before advising. Reflect their patterns back to them. Be warmer, more consultative. Still hold the P.R.E.P. standard.

CORE RULES (always active):
1. CEO FILTER: When the user shares a script, response, or pitch — rewrite it to be 50% shorter and 2x more impactful. Remove: "I think," "basically," "actually," "just," "sort of," "maybe," up-talking constructions. Lead with the rewrite, then briefly explain the one most important cut.
2. P.R.E.P. MANDATE: If the user rambles, name it: "That's a ramble — let's reset." Then ask them to re-deliver using Point → Reason → Example → Point.
3. BREVITY IN YOUR OWN RESPONSES: Keep coaching messages under 120 words unless doing a full rewrite. Model what you teach.
4. FILLER WORD CALLOUT: If the user includes "um," "uh," "like," "you know," "basically," "actually" — flag each one specifically.

TRANSCRIPTION NOTE: The user may send transcribed speech. It will be prefixed with "[Voice recording transcript]:". Treat it as spoken delivery and evaluate accordingly — filler words, structure, brevity, authority.

DAILY SCORECARD (always end your response with this exact block):
---SCORECARD---
Authority: [score 1–10]
Brevity: [score 1–10]
Clarity: [score 1–10]
Note: [one sentence of the single most important thing to improve]
---END---

SCORECARD RUBRICS:
- Authority (1–10): 1–3 = passive language, apologetic tone, qualifiers everywhere. 4–6 = mostly confident but hedges. 7–8 = clear, direct. 9–10 = commands attention, zero hedging.
- Brevity (1–10): 1–3 = wordy. 4–6 = mostly tight but padded. 7–8 = lean. 9–10 = surgical.
- Clarity (1–10): 1–3 = listener must work hard. 4–6 = understandable with context. 7–8 = clear to any adult. 9–10 = crystalline, point lands immediately.`;

function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {} }
function loadKey() { try { return localStorage.getItem(API_KEY_STORAGE) || ''; } catch(e) { return ''; } }
function saveKey(k) { try { localStorage.setItem(API_KEY_STORAGE, k); } catch(e) {} }
function initState() { return loadState() || { currentDay: 1, sessions: {}, tab: 'session' }; }

let state = initState();
let apiKey = loadKey();
let isLoading = false;
let chatHistory = [];
let keyError = '';

// Recording state
let mediaRecorder = null;
let audioChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;
let audioBlob = null;
let audioURL = null;
let isRecording = false;
let isTranscribing = false;

function getPhase(d) { return d <= 10 ? 1 : 2; }
function parseScorecard(text) {
  const m = text.match(/---SCORECARD---([\s\S]*?)---END---/);
  if (!m) return null;
  const b = m[1];
  const a = b.match(/Authority:\s*(\d+)/)?.[1];
  const br = b.match(/Brevity:\s*(\d+)/)?.[1];
  const c = b.match(/Clarity:\s*(\d+)/)?.[1];
  const n = b.match(/Note:\s*(.+)/)?.[1];
  if (!a) return null;
  return { authority: parseInt(a), brevity: parseInt(br), clarity: parseInt(c), note: n?.trim() };
}
function cleanResponse(text) { return text.replace(/---SCORECARD---([\s\S]*?)---END---/, '').trim(); }
function formatTime(s) { return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }

function renderKeyScreen() {
  return `<div class="card"><div class="apikey-screen">
    <h2>Connect your coach</h2>
    <p>Enter your Anthropic API key once. It's saved locally on your device — never sent anywhere except directly to Anthropic.</p>
    <div class="apikey-input-wrap">
      <input class="apikey-input" id="key-input" type="password" placeholder="sk-ant-..." />
      <button class="apikey-btn" onclick="handleSaveKey()">Save key</button>
    </div>
    ${keyError ? `<div class="error-msg">${keyError}</div>` : ''}
    <div class="apikey-hint" style="margin-top:12px;">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
  </div></div>`;
}

function handleSaveKey() {
  const input = document.getElementById('key-input');
  const val = input ? input.value.trim() : '';
  if (!val.startsWith('sk-')) { keyError = 'Key should start with "sk-". Check and try again.'; render(); return; }
  apiKey = val; saveKey(val); keyError = ''; render();
}
function handleRemoveKey() {
  if (!confirm('Remove your API key from this device?')) return;
  apiKey = ''; localStorage.removeItem(API_KEY_STORAGE); render();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    audioBlob = null;
    if (audioURL) { URL.revokeObjectURL(audioURL); audioURL = null; }
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      audioURL = URL.createObjectURL(audioBlob);
      stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      render();
      const player = document.getElementById('rec-player');
      if (player) player.src = audioURL;
    };
    mediaRecorder.start();
    isRecording = true;
    recordingSeconds = 0;
    recordingTimer = setInterval(() => {
      recordingSeconds++;
      const el = document.getElementById('rec-timer');
      if (el) el.textContent = formatTime(recordingSeconds);
    }, 1000);
    render();
  } catch(e) {
    alert('Microphone access denied. Please allow microphone access and try again.');
  }
}

function stopRecording() {
  if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function discardRecording() {
  audioBlob = null;
  if (audioURL) { URL.revokeObjectURL(audioURL); audioURL = null; }
  isRecording = false;
  recordingSeconds = 0;
  render();
}

async function transcribeAndSend() {
  if (!audioBlob) return;
  isTranscribing = true;
  render();
  try {
    // Use Whisper via OpenAI-compatible endpoint — fall back to Web Speech if unavailable
    // We'll use the browser's built-in SpeechRecognition as primary (no extra API needed)
    const transcript = await transcribeWithBrowser();
    discardRecording();
    isTranscribing = false;
    if (transcript) {
      const input = document.getElementById('chat-input');
      if (input) { input.value = '[Voice recording transcript]: ' + transcript; }
      render();
    }
  } catch(e) {
    isTranscribing = false;
    // fallback: just tell user to type
    discardRecording();
    alert('Transcription failed. Please type what you said instead.');
    render();
  }
}

function transcribeWithBrowser() {
  return new Promise((resolve, reject) => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { reject(new Error('Not supported')); return; }
    // Re-play audio and use recognition simultaneously isn't directly possible,
    // so we use real-time recognition on a fresh listen
    // Instead: prompt user that we'll do a live re-speak, or use file approach
    // Best approach: use Anthropic API with base64 audio via a prompt
    transcribeWithAnthropic().then(resolve).catch(reject);
  });
}

async function transcribeWithAnthropic() {
  // Convert blob to base64
  const arrayBuffer = await audioBlob.arrayBuffer();
  const uint8 = new Uint8Array(arrayBuffer);
  let binary = '';
  uint8.forEach(b => binary += String.fromCharCode(b));
  const base64 = btoa(binary);

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{
        role: 'user',
        content: [
          { type: 'text', text: 'Please transcribe this audio recording exactly as spoken. Return only the transcript, nothing else. If you cannot process the audio, return the text "TRANSCRIPTION_FAILED".' },
          { type: 'document', source: { type: 'base64', media_type: audioBlob.type || 'audio/webm', data: base64 } }
        ]
      }]
    })
  });
  const data = await resp.json();
  const text = data.content?.find(b => b.type === 'text')?.text?.trim();
  if (!text || text === 'TRANSCRIPTION_FAILED') throw new Error('failed');
  return text;
}

// Fallback: live speech recognition for recording
function startLiveSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return false;
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  let finalTranscript = '';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    const el = document.getElementById('live-transcript');
    if (el) el.textContent = (finalTranscript + interim).trim();
  };
  recognition.onerror = () => {};
  recognition.onend = () => {
    const input = document.getElementById('chat-input');
    if (input && finalTranscript.trim()) {
      input.value = '[Voice recording transcript]: ' + finalTranscript.trim();
    }
    isRecording = false;
    if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
    window._activeRecognition = null;
    render();
  };
  recognition.start();
  window._activeRecognition = recognition;
  return true;
}

function toggleRecording() {
  if (isRecording) {
    if (window._activeRecognition) { window._activeRecognition.stop(); return; }
    stopRecording();
  } else {
    // Try live speech recognition first (simpler, no extra API)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      audioBlob = null; audioURL = null;
      isRecording = true;
      recordingSeconds = 0;
      recordingTimer = setInterval(() => {
        recordingSeconds++;
        const el = document.getElementById('rec-timer');
        if (el) el.textContent = formatTime(recordingSeconds);
      }, 1000);
      render();
      startLiveSpeechRecognition();
    } else {
      startRecording();
    }
  }
}

function stopLiveAndSend() {
  if (window._activeRecognition) { window._activeRecognition.stop(); }
  else if (isRecording) { stopRecording(); }
}

function render() {
  const ui = document.getElementById('main-ui');
  if (!apiKey) { ui.innerHTML = renderKeyScreen(); return; }

  const day = state.currentDay;
  const phase = getPhase(day);
  const drill = DRILLS[day];
  const sess = state.sessions[day] || { messages: [], scorecard: null };
  const pct = Math.round((day / 25) * 100);
  let tabContent = '';

  if (state.tab === 'session') {
    const msgs = sess.messages.map(m => {
      if (m.role === 'assistant') return `<div class="msg msg-coach">${cleanResponse(m.content).replace(/\n/g,'<br>')}</div>`;
      return `<div class="msg msg-user">${m.content.replace(/\n/g,'<br>')}</div>`;
    }).join('');
    const emptyHint = sess.messages.length === 0 ? `<div style="text-align:center;padding:2rem 1rem;color:var(--hint);font-size:13px;">Start your Day ${day} session below</div>` : '';
    const sc = sess.scorecard;

    // Recorder UI
    let recUI = '';
    if (isTranscribing) {
      recUI = `<div class="recorder"><span class="transcribing-badge">Transcribing…</span></div>`;
    } else if (isRecording) {
      recUI = `<div class="recorder">
        <button class="rec-btn recording" onclick="stopLiveAndSend()">
          <span class="rec-dot"></span> Stop
        </button>
        <span class="rec-timer" id="rec-timer">${formatTime(recordingSeconds)}</span>
        <span id="live-transcript" style="font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </div>`;
    } else if (audioURL) {
      recUI = `<div class="recorder">
        <audio id="rec-player" controls src="${audioURL}" class="rec-audio"></audio>
        <button class="rec-send" onclick="transcribeAndSend()">Send to coach</button>
        <button class="rec-discard" onclick="discardRecording()">Discard</button>
      </div>`;
    } else {
      recUI = `<div class="recorder">
        <button class="rec-btn" onclick="toggleRecording()">
          <span class="rec-dot"></span> Record voice
        </button>
        <span style="font-size:12px;color:var(--hint);">or type below</span>
      </div>`;
    }

    tabContent = `
      <div class="card">
        <div class="drill-header">
          <div class="drill-icon">${drill.icon}</div>
          <div><div class="drill-name">${drill.name}</div><div class="drill-duration">${drill.duration} · Day ${day} drill</div></div>
        </div>
        <div class="drill-desc">${drill.desc}</div>
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chat-msgs">${emptyHint}${msgs}${isLoading ? '<div class="msg-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>' : ''}</div>
        ${recUI}
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="Type or use voice above…" rows="1"></textarea>
          <button class="send-btn" id="send-btn" ${isLoading ? 'disabled' : ''}>↑</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Session scorecard</div>
        <div class="scorecard">
          <div class="score-cell"><div class="score-label">Authority</div><div class="score-val ${sc?'':'score-pending'}">${sc ? sc.authority+'/10' : '–'}</div></div>
          <div class="score-cell"><div class="score-label">Brevity</div><div class="score-val ${sc?'':'score-pending'}">${sc ? sc.brevity+'/10' : '–'}</div></div>
          <div class="score-cell"><div class="score-label">Clarity</div><div class="score-val ${sc?'':'score-pending'}">${sc ? sc.clarity+'/10' : '–'}</div></div>
        </div>
        ${sc?.note ? `<div style="margin-top:10px;font-size:12.5px;color:var(--muted);line-height:1.6;border-top:0.5px solid var(--border);padding-top:10px;">Focus: ${sc.note}</div>` : ''}
      </div>`;
  } else if (state.tab === 'history') {
    const days = Object.keys(state.sessions).sort((a,b) => b-a);
    const rows = days.length === 0
      ? '<div class="empty-state">No sessions recorded yet</div>'
      : days.map(d => {
          const sc = state.sessions[d].scorecard;
          return `<div class="history-row">
            <div class="history-day">Day ${d} <span style="font-size:11px;color:var(--hint);font-weight:400;">Phase ${getPhase(parseInt(d))}</span></div>
            <div class="history-scores">${sc ? `<div class="hscore">A<span>${sc.authority}</span></div><div class="hscore">B<span>${sc.brevity}</span></div><div class="hscore">C<span>${sc.clarity}</span></div>` : '<div class="hscore" style="color:var(--hint)">no score</div>'}</div>
          </div>`;
        }).join('');
    tabContent = `<div class="card"><div class="card-title">Session history</div>${rows}</div>`;
  } else {
    tabContent = `
      <div class="card">
        <div class="card-title">API key</div>
        <div class="settings-row"><span class="settings-label">Key ending in ···${apiKey.slice(-4)}</span><button class="reset-btn" onclick="handleRemoveKey()">Remove</button></div>
      </div>
      <div class="card">
        <div class="card-title">Progress</div>
        <div class="settings-row"><span class="settings-label">Clear all sessions and scores</span><button class="reset-btn" onclick="resetApp()">Reset all</button></div>
      </div>`;
  }

  ui.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <span class="phase-badge phase-${phase}"><span class="phase-dot"></span>Phase ${phase}: ${phase===1?'Tactical Sprint':'Identity Shift'}</span>
      <span class="key-badge" onclick="switchTab('settings')"><span class="key-dot"></span>Key active</span>
    </div>
    <div class="progress-section">
      <div class="progress-meta"><span>Day ${day} of 25</span><span>${pct}% complete</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="day-nav">
      <button class="day-nav-btn" onclick="changeDay(-1)" ${day<=1?'disabled':''}>‹</button>
      <div class="day-label"><div class="day-num">Day ${day}</div><div class="day-sub">${drill.name}</div></div>
      <button class="day-nav-btn" onclick="changeDay(1)" ${day>=25?'disabled':''}>›</button>
    </div>
    <div class="tab-row">
      <button class="tab ${state.tab==='session'?'active':''}" onclick="switchTab('session')">Session</button>
      <button class="tab ${state.tab==='history'?'active':''}" onclick="switchTab('history')">History</button>
      <button class="tab ${state.tab==='settings'?'active':''}" onclick="switchTab('settings')">Settings</button>
    </div>
    ${tabContent}`;

  if (state.tab === 'session') {
    const msgs = document.getElementById('chat-msgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    if (input) input.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} });
    if (btn) btn.addEventListener('click', handleSend);
  }
}

function changeDay(dir) {
  const next = state.currentDay + dir;
  if (next < 1 || next > 25) return;
  state.currentDay = next;
  chatHistory = (state.sessions[state.currentDay]?.messages || []).map(m => ({role:m.role,content:m.content}));
  saveState(state); render();
}
function switchTab(tab) { state.tab = tab; saveState(state); render(); }
function resetApp() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = initState(); chatHistory = []; render();
}

async function handleSend() {
  if (isLoading) return;
  const input = document.getElementById('chat-input');
  const text = input ? input.value.trim() : '';
  if (!text) return;
  input.value = '';
  const day = state.currentDay;
  const phase = getPhase(day);
  const drill = DRILLS[day];
  if (!state.sessions[day]) state.sessions[day] = { messages: [], scorecard: null };
  const contextMsg = chatHistory.length === 0
    ? `[Session context: Day ${day}/25, Phase ${phase} (${phase===1?'Tactical Sprint':'Identity Shift'}), today's drill is "${drill.name}" — ${drill.desc}]\n\n${text}`
    : text;
  chatHistory.push({ role: 'user', content: contextMsg });
  state.sessions[day].messages.push({ role: 'user', content: text });
  isLoading = true; render();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: chatHistory })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.find(b => b.type==='text')?.text || 'Something went wrong.';
    chatHistory.push({ role: 'assistant', content: reply });
    state.sessions[day].messages.push({ role: 'assistant', content: reply });
    const sc = parseScorecard(reply);
    if (sc) state.sessions[day].scorecard = sc;
  } catch(e) {
    const err = `Error: ${e.message || 'Connection failed. Check your API key in Settings.'}`;
    chatHistory.push({ role: 'assistant', content: err });
    state.sessions[day].messages.push({ role: 'assistant', content: err });
  }
  isLoading = false; saveState(state); render();
}

chatHistory = (state.sessions[state.currentDay]?.messages || []).map(m => ({role:m.role,content:m.content}));
render();
</script>
